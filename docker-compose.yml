name: gridofwar

services:
  postgres:
    image: postgres:17-alpine
    container_name: gridofwar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gridofwar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gridofwar}
      POSTGRES_DB: ${POSTGRES_DB:-gridofwar}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gridofwar} -d ${POSTGRES_DB:-gridofwar}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gridofwar-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gridofwar-api:local
    container_name: gridofwar-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-gridofwar};Username=${POSTGRES_USER:-gridofwar};Password=${POSTGRES_PASSWORD:-gridofwar}"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gridofwar-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: gridofwar-frontend:local
    container_name: gridofwar-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - gridofwar-net

volumes:
  postgres-data:

networks:
  gridofwar-net:
    driver: bridge
